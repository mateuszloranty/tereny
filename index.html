<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, 
          maximum-scale=1.0, user-scalable=no">
    <title>Lista terenów — Mapa terenu</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 14px 16px;
            text-align: center;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .header .subtitle {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 4px;
        }

        .header .subtitle:empty {
            display: none;
        }

        .browse-root {
            flex: 1;
            overflow: auto;
            background: #f5f5f5;
        }

        .browse-inner {
            max-width: 560px;
            margin: 0 auto;
            padding: 16px 16px 28px;
        }

        .browse-count {
            font-size: 13px;
            color: #777;
            margin-bottom: 12px;
            text-align: center;
        }

        .browse-count.error {
            color: #e74c3c;
            font-weight: 600;
        }

        .terrain-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .terrain-list a {
            display: block;
            background: white;
            border-radius: 12px;
            padding: 14px 16px;
            text-decoration: none;
            color: #2c3e50;
            font-size: 15px;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 1px solid #e8e8e8;
            transition: transform 0.1s, box-shadow 0.15s;
        }

        .terrain-list a:active {
            transform: scale(0.99);
        }

        .terrain-list a:focus-visible {
            outline: 2px solid #356AC3;
            outline-offset: 2px;
        }

        .terrain-list .tid {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #999;
            margin-top: 6px;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1 id="page-title">Lista terenów</h1>
        <div class="subtitle" id="subtitle">Ładowanie bazy…</div>
    </div>

    <main id="browse-root" class="browse-root"></main>

    <script>
        (function () {
            var sp = new URLSearchParams(window.location.search);
            if (sp.get('id') || sp.get('poly')) {
                window.location.replace('teren.html' + window.location.search + window.location.hash);
                return;
            }

            function terrainFeatureId(feature) {
                const p = feature.properties || {};
                if (p.id !== undefined && p.id !== '') return String(p.id);
                if (feature.id !== undefined && feature.id !== '') return String(feature.id);
                return null;
            }

            function terenWord(n) {
                if (n === 1) return 'teren';
                var m10 = n % 10, m100 = n % 100;
                if (m10 >= 2 && m10 <= 4 && (m100 < 12 || m100 > 14)) return 'tereny';
                return 'terenów';
            }

            function showError(message) {
                document.getElementById('subtitle').textContent = '';
                document.getElementById('browse-root').innerHTML =
                    '<div class="browse-inner"><p class="browse-count error">' +
                    escapeHtml(message) +
                    '</p></div>';
            }

            function escapeHtml(s) {
                return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
            }

            fetch('tereny.geojson?t=' + Date.now())
                .then(response => {
                    if (!response.ok) throw new Error('Nie znaleziono pliku tereny.geojson');
                    return response.json();
                })
                .then(geojson => {
                    let features = (geojson.features || []).filter(function (f) {
                        return (
                            f.geometry?.type === 'Polygon' &&
                            Array.isArray(f.geometry.coordinates?.[0])
                        );
                    });

                    features = features.filter(function (f) {
                        return terrainFeatureId(f) !== null;
                    });

                    features.sort(function (a, b) {
                        const pa = a.properties || {};
                        const pb = b.properties || {};
                        const ta = pa.title || pa.name || terrainFeatureId(a);
                        const tb = pb.title || pb.name || terrainFeatureId(b);
                        return String(ta).localeCompare(String(tb), 'pl');
                    });

                    document.getElementById('subtitle').textContent =
                        'Wybierz teren, aby zobaczyć mapę i nawigację';

                    const root = document.getElementById('browse-root');
                    if (!features.length) {
                        root.innerHTML =
                            '<div class="browse-inner"><p class="browse-count">' +
                            'Brak zdefiniowanych terenów w pliku geojson.' +
                            '</p></div>';
                        return;
                    }

                    let html =
                        '<div class="browse-inner">' +
                        '<p class="browse-count">' +
                        features.length +
                        ' ' +
                        terenWord(features.length) +
                        '</p><ul class="terrain-list">';
                    for (let i = 0; i < features.length; i++) {
                        const f = features[i];
                        const id = terrainFeatureId(f);
                        const p = f.properties || {};
                        const label = p.title || p.name || 'Teren ' + id;
                        const esc = escapeHtml(label);
                        html +=
                            '<li><a href="teren.html?id=' +
                            encodeURIComponent(id) +
                            '">' +
                            esc +
                            '<span class="tid">ID: ' +
                            escapeHtml(String(id)) +
                            '</span></a></li>';
                    }
                    html += '</ul></div>';
                    root.innerHTML = html;
                })
                .catch(err => {
                    console.error(err);
                    showError('Błąd wczytywania listy: ' + err.message);
                });
        })();
    </script>

</body>

</html>
